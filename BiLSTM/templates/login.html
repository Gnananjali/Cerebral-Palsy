{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card animate-in">
        <div class="auth-logo">
            <div class="brand-icon" style="width:64px;height:64px;font-size:1.8rem;margin:0 auto 0.75rem;">
                <i class="fas fa-brain"></i>
            </div>
            <div class="auth-title">Welcome Back</div>
            <div class="auth-sub">Sign in to CP-Detect AI</div>
        </div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required
                        autofocus id="loginUsername">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required
                        id="loginPassword">
                </div>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
        <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #f0ece0;">
            <div
                style="font-size:0.78rem;color:#aaa;text-align:center;margin-bottom:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">
                Demo Credentials</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="fillLogin('admin','admin123')">
                    <i class="fas fa-shield-alt"></i> Admin
                </button>
                <button class="btn btn-secondary btn-sm" onclick="fillLogin('dr_smith','user123')">
                    <i class="fas fa-user-md"></i> User Demo
                </button>
            </div>
        </div>
    </div>
</div>
<script>
    function fillLogin(u, p) {
        document.getElementById('loginUsername').value = u;
        document.getElementById('loginPassword').value = p;
    }
</script>
{% endblock %}
